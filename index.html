<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Aim Trainer Matemático</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      text-align: center;
      background: #f2f2f2;
    }

    #menu {
      margin: 20px auto;
      padding: 15px;
      background: white;
      width: 500px;
      border-radius: 10px;
      box-shadow: 0 0 10px #ccc;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      margin: 0 10px;
      cursor: pointer;
      border: none;
      border-radius: 5px;
      background: #007bff;
      color: white;
      font-weight: bold;
    }

    #gameArea {
      width: 800px;
      height: 500px;
      margin: 20px auto;
      background: white;
      position: relative;
      border: 2px solid black;
      overflow: hidden;
      opacity: 0.5;
      pointer-events: none;
    }

    #target {
      width: 50px;
      height: 50px;
      background: red;
      border-radius: 50%;
      position: absolute;
      cursor: pointer;
      display: none;
    }

    #info {
      font-size: 20px;
      margin-top: 10px;
    }
  </style>
</head>

<body>
  <h1>🎯 Aim Lab Matemático</h1>
  <div id="menu">
    <h3>Selecciona el tiempo de la prueba:</h3>
    <button onclick="iniciarJuego(15)">15 Segundos</button>
    <button onclick="iniciarJuego(30)">30 Segundos</button>
    <button onclick="iniciarJuego(60)">60 Segundos</button>
  </div>
  <div id="gameArea">
    <div id="target"></div>
  </div>
  <div id="info">⏱ Tiempo: <span id="time">0</span>s | 🏆 Puntos: <span id="score">0</span> | ❌ Equivocaciones: <span
      id="misses">0</span></div>

  <script>
    const target = document.getElementById("target"), gameArea = document.getElementById("gameArea"), timeText = document.getElementById("time"), scoreText = document.getElementById("score"), missesText = document.getElementById("misses"), menu = document.getElementById("menu");
    let score = 0, timeLeft = 0, times = [], misses = 0, startTime = 0, sessionStartTime = 0, trayectoria = [], juegoActivo = false, timerInterval;

    document.addEventListener("mousemove", (e) => {
      if (juegoActivo && timeLeft > 0) trayectoria.push({ t: Date.now() - sessionStartTime, x: e.clientX, y: e.clientY });
    });

    function iniciarJuego(segundos) {
      menu.style.display = "none"; gameArea.style.opacity = "1"; gameArea.style.pointerEvents = "auto"; target.style.display = "block";
      score = 0; misses = 0; times = []; trayectoria = []; timeLeft = segundos;
      scoreText.textContent = score; timeText.textContent = timeLeft; missesText.textContent = misses;
      juegoActivo = true; sessionStartTime = Date.now();
      moveTarget();
      timerInterval = setInterval(() => { timeLeft--; timeText.textContent = timeLeft; if (timeLeft <= 0) { clearInterval(timerInterval); juegoActivo = false; target.style.display = "none"; finishGame(); } }, 1000);
    }

    function moveTarget() { target.style.left = (Math.random() * (gameArea.clientWidth - 50)) + "px"; target.style.top = (Math.random() * (gameArea.clientHeight - 50)) + "px"; startTime = Date.now(); }

    target.addEventListener("click", (e) => { if (!juegoActivo) return; e.stopPropagation(); times.push(Date.now() - startTime); score += 10; scoreText.textContent = score; moveTarget(); });
    gameArea.addEventListener("click", () => { if (!juegoActivo) return; misses++; score = Math.max(0, score - 5); scoreText.textContent = score; missesText.textContent = misses; });

    // --- NUEVA FUNCIÓN: Genera y descarga el CSV con el análisis cinemático ---
    function descargarCSV() {
      let csv = "Tiempo(ms),Pos_X,Pos_Y,Velocidad,Aceleracion,Estado\n";
      let prevT = null, prevX = null, prevY = null, prevV = null;
      
      trayectoria.forEach((p, i) => {
        let v = 0, a = 0, estado = "Estable";
        if (i > 0) {
          let dt = Math.max(p.t - prevT, 1);
          v = Math.sqrt((p.x - prevX)**2 + (p.y - prevY)**2) / dt;
          if (i > 1) { 
            a = (v - prevV) / dt; 
            estado = a > 0.001 ? "Creciente" : (a < -0.001 ? "Decreciente" : "Estable"); 
          }
        }
        csv += `${p.t},${p.x},${p.y},${v.toFixed(4)},${a.toFixed(4)},${estado}\n`;
        prevT = p.t; prevX = p.x; prevY = p.y; prevV = v;
      });
      
      let link = document.createElement("a");
      link.href = encodeURI("data:text/csv;charset=utf-8," + csv);
      link.download = "datos_aimlab.csv";
      link.click();
    }

    function finishGame() {
      let avg = times.length ? times.reduce((a, b) => a + b) / times.length : 0;
      let data = { score, avg, misses, date: new Date().toLocaleString() };
      let oldData = JSON.parse(localStorage.getItem("aimData")) || [];
      oldData.push(data);
      localStorage.setItem("aimData", JSON.stringify(oldData));
      
      // Llamamos a la función para descargar el archivo antes de salir
      descargarCSV();
      
      alert(`Juego Finalizado.\nScore: ${score}\nEquivocaciones: ${misses}`);
      window.location.href = "dashboard.html";
    }
  </script>
</body>

</html>
